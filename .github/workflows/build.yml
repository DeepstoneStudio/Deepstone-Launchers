name: Deepstone Launcher ULTRA CI

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build Launcher
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ⏱ Start timer
      - name: Start timer
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      # 🔢 Auto bump PATCH
      - name: Bump version
        id: bump
        run: |
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"

          jq ".version = \"$NEW\"" package.json > tmp.json && mv tmp.json package.json
          echo "version=$NEW" >> $GITHUB_OUTPUT

      # 🧠 Smart changelog
      - name: Generate smart changelog
        id: log
        run: |
          COMMITS=$(git log -20 --pretty=format:"%s")

          FEATURES=""
          FIXES=""
          PERF=""
          OTHER=""

          while IFS= read -r line; do
            if [[ "$line" == *"Bump version"* ]] || [[ "$line" == *"Merge"* ]]; then
              continue
            fi

            if [[ "$line" == feat* ]]; then
              FEATURES+="• ${line#feat: }\n"
            elif [[ "$line" == fix* ]]; then
              FIXES+="• ${line#fix: }\n"
            elif [[ "$line" == perf* ]]; then
              PERF+="• ${line#perf: }\n"
            else
              OTHER+="• $line\n"
            fi
          done <<< "$COMMITS"

          CHANGELOG=""

          if [ ! -z "$FEATURES" ]; then
            CHANGELOG+="### 🚀 Nouveautés\n$FEATURES\n"
          fi

          if [ ! -z "$FIXES" ]; then
            CHANGELOG+="### 🛠 Corrections\n$FIXES\n"
          fi

          if [ ! -z "$PERF" ]; then
            CHANGELOG+="### ⚡ Optimisations\n$PERF\n"
          fi

          if [ ! -z "$OTHER" ]; then
            CHANGELOG+="### 📦 Divers\n$OTHER\n"
          fi

          CHANGELOG=$(echo -e "$CHANGELOG" | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "log=$CHANGELOG" >> $GITHUB_OUTPUT

      # 📥 Download builds
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 🚀 Create Release + Upload assets
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: |
            🚀 Deepstone Launcher v${{ steps.bump.outputs.version }}

            ${{ steps.log.outputs.log }}
          draft: false
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.DEEP_TOKEN }}

      # ⏱ End timer
      - name: End timer
        id: end
        run: |
          END=$(date +%s)
          START=${{ steps.start.outputs.time }}
          DURATION=$((END - START))
          echo "duration=$DURATION" >> $GITHUB_OUTPUT

      # 🔔 Discord Embed
      - name: Discord Notification
        if: success()
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          DURATION=${{ steps.end.outputs.duration }}
          WEBHOOK=${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/latest"

          jq -n \
            --arg version "$VERSION" \
            --arg duration "$DURATION sec" \
            --arg release "$RELEASE_URL" \
            '{
              embeds: [{
                title: "🚀 Nouvelle Release Deepstone",
                color: 3066993,
                fields: [
                  {name: "🧩 Version", value: $version, inline: true},
                  {name: "⏱ Build time", value: $duration, inline: true},
                  {name: "🔗 Télécharger", value: $release, inline: false}
                ],
                footer: {text: "Deepstone Studio CI"},
                timestamp: now | todate
              }]
            }' > payload.json

          curl -H "Content-Type: application/json" \
               -d @payload.json \
               "$WEBHOOK"