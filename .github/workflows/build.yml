name: Deepstone Launcher CI

on:
  push:
    branches: [ master ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      changelog: ${{ steps.changelog.outputs.log }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔐 Auto bump PATCH
      - name: Bump version
        id: bump
        run: |
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"

          jq ".version = \"$NEW\"" package.json > tmp.json && mv tmp.json package.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Bump version to $NEW"
          git tag -a "v$NEW" -m "Version $NEW"
          git push origin master --tags
          echo "version=$NEW" >> $GITHUB_OUTPUT

      # 🏷️ Changelog auto (10 derniers commits)
      - name: Generate changelog
        id: changelog
        run: |
          LOG=$(git log -10 --pretty=format:"• %s")
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release (published)
        env:
          TOKEN: ${{ secrets.DEEP_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANGELOG: ${{ needs.prepare.outputs.changelog }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{
              \"tag_name\": \"v$VERSION\",
              \"name\": \"v$VERSION\",
              \"body\": \"$CHANGELOG\",
              \"draft\": false,
              \"prerelease\": false
            }"

  build:
    needs: release
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - run: npm ci
      - name: Build with timer (multi-OS)
        run: |
          node -e "
            const { execSync } = require('child_process');
            const start = Date.now();
            execSync('npm run build', { stdio: 'inherit' });
            const duration = Math.round((Date.now() - start)/1000);
            require('fs').writeFileSync('duration.txt', duration.toString());
          "
      - name: Upload duration
        uses: actions/upload-artifact@v4
        with:
          name: duration-${{ matrix.os }}
          path: duration.txt

  discord:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Calculate total duration
        id: duration
        run: |
          TOTAL=0
          for f in artifacts/duration-*/duration.txt; do
            D=$(cat "$f")
            TOTAL=$((TOTAL + D))
          done
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
      - name: Send Discord Embed
        run: |
          WEBHOOK="${{ secrets.DISCORD_WEBHOOK_URL }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          CHANGELOG="${{ needs.prepare.outputs.changelog }}"
          DURATION="${{ steps.duration.outputs.total }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          jq -n \
            --arg title "🚀 Nouvelle Release Deepstone" \
            --arg version "$VERSION" \
            --arg changelog "$CHANGELOG" \
            --arg duration "${DURATION}s" \
            --arg run "$RUN_URL" \
            --argjson color 3066993 \
            '{
              embeds: [ {
                title: $title,
                color: $color,
                thumbnail: { url: "https://deep.deepstone.fr/storage/img/deepstone-server-survie.png" },
                fields: [
                  { name: "🧩 Version", value: $version, inline: true },
                  { name: "📊 Temps total build", value: $duration, inline: true },
                  { name: "📝 Changelog", value: $changelog, inline: false },
                  { name: "⚙️ Workflow", value: $run, inline: false }
                ],
                footer: { text: "Deepstone Studio CI 2026" },
                timestamp: now | todate
              } ]
            }' > payload.json

          curl -H "Content-Type: application/json" \
               -d @payload.json \
               "$WEBHOOK"