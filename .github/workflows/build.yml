name: Deepstone Launcher ULTRA CI

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Start timer
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"

          jq ".version = \"$NEW\"" package.json > tmp.json && mv tmp.json package.json
          echo "version=$NEW" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: log
        run: |
          echo "log<<EOF" >> $GITHUB_OUTPUT
          git log -10 --pretty=format:"• %s" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: |
            🚀 Deepstone Launcher v${{ steps.bump.outputs.version }}

            ${{ steps.log.outputs.log }}
          draft: false
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.DEEP_TOKEN }}

      - name: End timer
        id: end
        run: |
          END=$(date +%s)
          START=${{ steps.timer.outputs.start }}
          DURATION=$((END - START))
          echo "duration=$DURATION" >> $GITHUB_OUTPUT

      - name: Discord Notification
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          DURATION=${{ steps.end.outputs.duration }}
          WEBHOOK=${{ secrets.DISCORD_WEBHOOK_URL }}

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/latest"

          EXE_URL=$(ls artifacts/**/**/*.exe 2>/dev/null | head -n1)
          DMG_URL=$(ls artifacts/**/**/*.dmg 2>/dev/null | head -n1)
          APPIMAGE_URL=$(ls artifacts/**/**/*.AppImage 2>/dev/null | head -n1)

          jq -n \
            --arg version "$VERSION" \
            --arg duration "$DURATION sec" \
            --arg release "$RELEASE_URL" \
            --arg exe "$EXE_URL" \
            --arg dmg "$DMG_URL" \
            --arg app "$APPIMAGE_URL" \
            '{
              embeds: [{
                title: "🚀 Nouvelle Release Deepstone",
                color: 3066993,
                fields: [
                  {name: "🧩 Version", value: $version, inline: true},
                  {name: "⏱ Build time", value: $duration, inline: true},
                  {name: "⬇ Windows", value: ($exe // "N/A"), inline: false},
                  {name: "⬇ macOS", value: ($dmg // "N/A"), inline: false},
                  {name: "⬇ Linux", value: ($app // "N/A"), inline: false},
                  {name: "🔗 Release", value: $release, inline: false}
                ],
                footer: {text: "Deepstone Studio CI"},
                timestamp: now | todate
              }]
            }' > payload.json

          curl -H "Content-Type: application/json" \
               -d @payload.json \
               "$WEBHOOK"